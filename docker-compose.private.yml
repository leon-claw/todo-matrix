services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-matrix-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://todo_matrix:todo_matrix_private@mysql:3306/todo_matrix
      COOKIE_NAME: todo_matrix_session
      CORS_ORIGINS: https://todo-matrix.jianghong.site,http://127.0.0.1:5173,http://localhost:5173
      NODE_ENV: production
      SERVER_PORT: 3001
      SESSION_DAYS: 30
      WEB_ROOT: /app/dist
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: todo-matrix-private-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: todo_matrix_root_private
      MYSQL_DATABASE: todo_matrix
      MYSQL_USER: todo_matrix
      MYSQL_PASSWORD: todo_matrix_private
    volumes:
      - todo_matrix_private_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -utodo_matrix -ptodo_matrix_private --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  todo_matrix_private_mysql:
